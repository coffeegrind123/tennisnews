name: Scrape Tennis News

on:
  schedule:
    - cron: '0 6,14 * * *'  # 8am and 4pm Europe/Helsinki (UTC+2 in winter, UTC+3 in summer)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache camoufox browser
        id: cache-camoufox
        uses: actions/cache@v4
        with:
          path: backend/camoufox_build
          key: camoufox-patched-v146.0.1-beta.25

      - name: Download camoufox browser
        if: steps.cache-camoufox.outputs.cache-hit != 'true'
        run: |
          cd backend
          curl -L -o camoufox.zip "https://github.com/coffeegrind123/camoufox-beta/releases/download/v146.0.1-beta.25-patched/camoufox-146.0.1-beta.25-lin.x86_64.zip"
          unzip camoufox.zip -d camoufox_build
          rm camoufox.zip
          chmod +x camoufox_build/camoufox-bin
          ls -la camoufox_build/

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libx11-xcb1 libasound2 libdbus-glib-1-2 libxt6

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Run scraper
        working-directory: backend/src
        run: python scraper.py
        timeout-minutes: 20

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/ public/
          git diff --staged --quiet || git commit -m "Update tennis news $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
